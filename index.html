<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRM — Plan Salud Ideal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0f0f0f;
  --bg2: #181818;
  --bg3: #222222;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0ede8;
  --text2: #8a8680;
  --text3: #555250;
  --accent: #c8f542;
  --accent-dim: rgba(200,245,66,0.12);
  --red: #ff4d4d;
  --red-dim: rgba(255,77,77,0.1);
  --blue: #4d9fff;
  --blue-dim: rgba(77,159,255,0.1);
  --amber: #ffb347;
  --amber-dim: rgba(255,179,71,0.1);
  --green: #4dff91;
  --green-dim: rgba(77,255,145,0.1);
  --purple: #b47aff;
  --purple-dim: rgba(180,122,255,0.1);
  --radius: 10px;
  --radius-lg: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }
::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }

/* Layout */
.sidebar { position: fixed; top: 0; left: 0; width: 220px; height: 100vh; background: var(--bg2); border-right: 1px solid var(--border); padding: 1.5rem 1rem; display: flex; flex-direction: column; gap: 2rem; z-index: 10; }
.logo { display: flex; align-items: center; gap: 10px; padding: 0 0.5rem; }
.logo-dot { width: 28px; height: 28px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.logo-dot svg { width: 16px; height: 16px; }
.logo-text { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; line-height: 1.2; }
.logo-sub { font-size: 10px; color: var(--text3); font-weight: 400; }
nav { display: flex; flex-direction: column; gap: 3px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: var(--radius); cursor: pointer; color: var(--text2); font-size: 13px; transition: all 0.15s; border: none; background: none; width: 100%; text-align: left; }
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: var(--accent-dim); color: var(--accent); }
.nav-icon { width: 16px; height: 16px; flex-shrink: 0; }
.main { margin-left: 220px; padding: 2rem; min-height: 100vh; }
.topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
.page-title { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
.btn-new { background: var(--accent); color: #0f0f0f; border: none; padding: 9px 18px; border-radius: var(--radius); font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: opacity 0.15s; }
.btn-new:hover { opacity: 0.85; }

/* Métricas */
.metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 2rem; }
.metric { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; }
.metric-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
.metric-val { font-size: 28px; font-weight: 600; letter-spacing: -0.03em; }
.metric-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
.metric.accent .metric-val { color: var(--accent); }

/* Pipeline */
.pipeline { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
.stage { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 12px; min-height: 200px; }
.stage-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.stage-name { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text2); }
.stage-cnt { font-size: 11px; font-family: 'DM Mono', monospace; background: var(--bg3); border-radius: 6px; padding: 2px 7px; color: var(--text2); }
.lead-card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; margin-bottom: 6px; cursor: pointer; transition: border-color 0.15s; }
.lead-card:hover { border-color: var(--border2); }
.lead-card-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
.lead-card-meta { font-size: 11px; color: var(--text3); }
.lead-card-badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 6px; margin-top: 5px; font-weight: 500; }
.badge-meta { background: var(--blue-dim); color: var(--blue); }
.badge-google { background: var(--green-dim); color: var(--green); }
.badge-referido { background: var(--purple-dim); color: var(--purple); }
.badge-ig { background: var(--red-dim); color: #ff8a8a; }
.badge-otro { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
.stage-empty { text-align: center; padding: 1.5rem 0; color: var(--text3); font-size: 12px; }
.stage-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.dot-nuevo { background: var(--blue); }
.dot-contactado { background: var(--purple); }
.dot-reunion { background: var(--amber); }
.dot-propuesta { background: #ff9a4d; }
.dot-cerrado { background: var(--green); }
.dot-perdido { background: var(--red); }

/* Lista */
.list-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { padding: 10px 14px; text-align: left; font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); background: var(--bg2); }
td { padding: 11px 14px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tbody tr { cursor: pointer; transition: background 0.1s; }
tbody tr:hover td { background: var(--bg3); }
.etapa-pill { font-size: 11px; padding: 3px 9px; border-radius: 6px; font-weight: 500; white-space: nowrap; display: inline-block; }
.ep-nuevo { background: var(--blue-dim); color: var(--blue); }
.ep-contactado { background: var(--purple-dim); color: var(--purple); }
.ep-reunion { background: var(--amber-dim); color: var(--amber); }
.ep-propuesta { background: rgba(255,154,77,0.12); color: #ff9a4d; }
.ep-cerrado { background: var(--green-dim); color: var(--green); }
.ep-perdido { background: var(--red-dim); color: var(--red); }

/* Modal */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1rem; backdrop-filter: blur(4px); }
.modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 2rem; width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto; }
.modal-title { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 1.5rem; color: var(--text); }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.fg { display: flex; flex-direction: column; gap: 6px; }
.fg.full { grid-column: 1/-1; }
.fg label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }
.fg input, .fg select, .fg textarea {
  background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 9px 12px;
  transition: border-color 0.15s; outline: none;
}
.fg input:focus, .fg select:focus, .fg textarea:focus { border-color: var(--border2); }
.fg select option { background: var(--bg3); }
.fg textarea { min-height: 80px; resize: vertical; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.5rem; }
.btn-cancel { background: transparent; border: 1px solid var(--border); color: var(--text2); padding: 9px 18px; border-radius: var(--radius); font-size: 13px; cursor: pointer; }
.btn-cancel:hover { border-color: var(--border2); color: var(--text); }
.btn-save { background: var(--accent); color: #0f0f0f; border: none; padding: 9px 20px; border-radius: var(--radius); font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-save:hover { opacity: 0.85; }
.btn-del { background: transparent; border: 1px solid rgba(255,77,77,0.3); color: var(--red); padding: 9px 16px; border-radius: var(--radius); font-size: 13px; cursor: pointer; }
.btn-del:hover { background: var(--red-dim); }
.detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.detail-row:last-child { border-bottom: none; }
.dl { color: var(--text3); }
.dv { color: var(--text); text-align: right; max-width: 60%; word-break: break-word; }
.tabs { display: flex; gap: 6px; margin-bottom: 1.5rem; }
.tab-btn { padding: 7px 16px; border-radius: var(--radius); border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
.tab-btn.active { background: var(--bg3); color: var(--text); border-color: var(--border2); font-weight: 500; }
.error-bar { background: var(--red-dim); border: 1px solid rgba(255,77,77,0.25); border-radius: var(--radius); padding: 10px 14px; color: var(--red); font-size: 13px; margin-bottom: 1rem; }
.loading { text-align: center; padding: 3rem; color: var(--text3); }
.seg-alert { background: var(--amber-dim); border-left: 2px solid var(--amber); padding: 3px 8px; border-radius: 4px; font-size: 11px; color: var(--amber); margin-top: 4px; display: inline-block; }
@media (max-width: 1200px) { .pipeline { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 900px) { .metrics { grid-template-columns: repeat(2, 1fr); } .sidebar { display: none; } .main { margin-left: 0; } }
@media (max-width: 600px) { .pipeline { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="logo">
    <div class="logo-dot">
      <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="#0f0f0f" stroke-width="2"/><circle cx="8" cy="8" r="2" fill="#0f0f0f"/></svg>
    </div>
    <div>
      <div class="logo-text">Plan Salud Ideal</div>
      <div class="logo-sub">CRM de leads</div>
    </div>
  </div>
  <nav>
    <button class="nav-item active" onclick="setView('pipeline')">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="4" height="10" rx="1"/><rect x="6" y="5" width="4" height="8" rx="1"/><rect x="11" y="1" width="4" height="12" rx="1"/></svg>
      Pipeline
    </button>
    <button class="nav-item" onclick="setView('lista')">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="1" y1="4" x2="15" y2="4"/><line x1="1" y1="8" x2="15" y2="8"/><line x1="1" y1="12" x2="15" y2="12"/></svg>
      Lista
    </button>
  </nav>
  <div style="margin-top:auto; font-size:11px; color:var(--text3); padding: 0 0.5rem;">
    Conectado a Supabase ✓
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div>
      <div class="page-title" id="page-title">Pipeline</div>
    </div>
    <button class="btn-new" onclick="openForm()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><line x1="7" y1="1" x2="7" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="1" y1="7" x2="13" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      Nuevo lead
    </button>
  </div>

  <div id="err-bar" class="error-bar" style="display:none"></div>

  <div class="metrics" id="metrics">
    <div class="metric"><div class="metric-label">Total leads</div><div class="metric-val" id="m-total">—</div></div>
    <div class="metric accent"><div class="metric-label">Cerrados</div><div class="metric-val" id="m-cerrados">—</div></div>
    <div class="metric"><div class="metric-label">Conversión</div><div class="metric-val" id="m-conv">—</div></div>
    <div class="metric"><div class="metric-label">UF en cartera</div><div class="metric-val" id="m-uf">—</div></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-pipeline" onclick="setView('pipeline')">Pipeline</button>
    <button class="tab-btn" id="tab-lista" onclick="setView('lista')">Lista</button>
  </div>

  <div id="content"><div class="loading">Cargando leads...</div></div>
</main>

<!-- Modal form -->
<div class="overlay" id="form-modal" style="display:none" onclick="if(event.target===this)closeForm()">
  <div class="modal">
    <div class="modal-title" id="form-title">Nuevo lead</div>
    <div class="form-grid">
      <div class="fg"><label>Nombre *</label><input id="f-nombre" placeholder="María González"/></div>
      <div class="fg"><label>Teléfono</label><input id="f-tel" placeholder="+56 9 1234 5678"/></div>
      <div class="fg"><label>Email</label><input id="f-email" type="email" placeholder="maria@email.com"/></div>
      <div class="fg"><label>Fuente</label>
        <select id="f-fuente"><option value="">—</option><option>Meta Ads</option><option>Google Ads</option><option>Referido</option><option>Instagram orgánico</option><option>Otro</option></select>
      </div>
      <div class="fg"><label>Isapre actual</label>
        <select id="f-isapre"><option value="">—</option><option>Fonasa</option><option>Banmédica</option><option>Consalud</option><option>Cruz Blanca</option><option>Nueva Masvida</option><option>Colmena</option><option>Vida Tres</option><option>San Lorenzo</option><option>Otra</option></select>
      </div>
      <div class="fg"><label>Plan actual</label><input id="f-plan-actual" placeholder="GES + Libre Elección"/></div>
      <div class="fg"><label>Precio actual (UF)</label><input id="f-precio-uf" type="number" step="0.01" placeholder="3.5"/></div>
      <div class="fg"><label>Cargas</label><input id="f-cargas" type="number" min="0" value="0"/></div>
      <div class="fg"><label>Etapa</label>
        <select id="f-etapa"><option>Nuevo lead</option><option>Contactado</option><option>Reunión agendada</option><option>Propuesta enviada</option><option>Cerrado</option><option>Perdido</option></select>
      </div>
      <div class="fg"><label>Próximo seguimiento</label><input id="f-seg" type="date"/></div>
      <div class="fg"><label>Plan tomado</label><input id="f-plan-tomado" placeholder="Solo si cerró"/></div>
      <div class="fg"><label>Valor plan (UF)</label><input id="f-valor-plan" type="number" step="0.01"/></div>
      <div class="fg full"><label>Notas</label><textarea id="f-notas" placeholder="Historial de conversaciones, observaciones..."></textarea></div>
    </div>
    <div class="modal-actions">
      <button class="btn-del" id="btn-del" style="display:none" onclick="handleDelete()">Eliminar</button>
      <button class="btn-cancel" onclick="closeForm()">Cancelar</button>
      <button class="btn-save" onclick="handleSave()">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal detalle -->
<div class="overlay" id="detail-modal" style="display:none" onclick="if(event.target===this)closeDetail()">
  <div class="modal">
    <div class="modal-title" id="detail-name"></div>
    <div id="detail-body"></div>
    <div class="modal-actions">
      <button class="btn-del" onclick="handleDeleteFromDetail()">Eliminar</button>
      <button class="btn-cancel" onclick="closeDetail()">Cerrar</button>
      <button class="btn-save" onclick="editFromDetail()">Editar</button>
    </div>
  </div>
</div>

<script>
const SB = 'https://ddqjllwdbhrxnzbcqfug.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkcWpsbHdkYmhyeG56YmNxZnVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMTEyNjAsImV4cCI6MjA5MzY4NzI2MH0.LeSH3cutXM7k1wcJhrAM0QJocj6a6XbIYYakrdkiQlM';
const H = {'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY};
const ETAPAS = ['Nuevo lead','Contactado','Reunión agendada','Propuesta enviada','Cerrado','Perdido'];

let leads = [], currentView = 'pipeline', editingId = null, detailId = null;
const today = new Date().toISOString().slice(0,10);

async function req(method, path, body) {
  const r = await fetch(SB+'/rest/v1/'+path, {method, headers:H, body:body?JSON.stringify(body):undefined});
  if (!r.ok) throw new Error(await r.text());
  if (r.status===204||method==='DELETE') return null;
  return r.json();
}

async function load() {
  try {
    leads = await req('GET','leads?select=*&order=created_at.desc');
    document.getElementById('err-bar').style.display='none';
  } catch(e) {
    showErr('Error al cargar: '+e.message); leads=[];
  }
  updateMetrics(); renderContent();
}

function showErr(msg) { const b=document.getElementById('err-bar'); b.textContent=msg; b.style.display='block'; }

function updateMetrics() {
  const total=leads.length, cerrados=leads.filter(l=>l.etapa==='Cerrado').length;
  const conv=total?Math.round(cerrados/total*100):0;
  const uf=leads.filter(l=>l.etapa==='Cerrado'&&l.valor_plan_uf).reduce((a,b)=>a+(b.valor_plan_uf||0),0);
  document.getElementById('m-total').textContent=total;
  document.getElementById('m-cerrados').textContent=cerrados;
  document.getElementById('m-conv').textContent=conv+'%';
  document.getElementById('m-uf').textContent=uf.toFixed(1)+' UF';
}

function setView(v) {
  currentView=v;
  ['pipeline','lista'].forEach(x=>{
    document.getElementById('tab-'+x).classList.toggle('active',x===v);
  });
  document.getElementById('page-title').textContent=v==='pipeline'?'Pipeline':'Lista de leads';
  document.querySelectorAll('.nav-item').forEach((el,i)=>el.classList.toggle('active',i===(['pipeline','lista'].indexOf(v))));
  renderContent();
}

function fuenteClass(f) {
  if (!f) return '';
  if (f.startsWith('Meta')) return 'badge-meta';
  if (f.startsWith('Google')) return 'badge-google';
  if (f==='Referido') return 'badge-referido';
  if (f.startsWith('Instagram')) return 'badge-ig';
  return 'badge-otro';
}
function etapaClass(e) {
  const m={'Nuevo lead':'ep-nuevo','Contactado':'ep-contactado','Reunión agendada':'ep-reunion','Propuesta enviada':'ep-propuesta','Cerrado':'ep-cerrado','Perdido':'ep-perdido'};
  return m[e]||'';
}
function dotClass(e) {
  const m={'Nuevo lead':'dot-nuevo','Contactado':'dot-contactado','Reunión agendada':'dot-reunion','Propuesta enviada':'dot-propuesta','Cerrado':'dot-cerrado','Perdido':'dot-perdido'};
  return m[e]||'';
}
function isHoy(d) { return d===today; }

function renderContent() {
  const el=document.getElementById('content');
  if (currentView==='pipeline') {
    el.innerHTML='<div class="pipeline">'+ETAPAS.map(etapa=>{
      const col=leads.filter(l=>l.etapa===etapa);
      return `<div class="stage">
        <div class="stage-head">
          <div style="display:flex;align-items:center;gap:6px">
            <div class="stage-dot ${dotClass(etapa)}"></div>
            <span class="stage-name">${etapa}</span>
          </div>
          <span class="stage-cnt">${col.length}</span>
        </div>
        ${col.length===0?'<div class="stage-empty">—</div>':''}
        ${col.map(l=>`<div class="lead-card" onclick="openDetail('${l.id}')">
          <div class="lead-card-name">${l.nombre}</div>
          <div class="lead-card-meta">${l.isapre_actual||'—'}</div>
          ${l.fuente?`<span class="lead-card-badge ${fuenteClass(l.fuente)}">${l.fuente}</span>`:''}
          ${l.fecha_proximo_seguimiento&&l.fecha_proximo_seguimiento<=today?`<div class="seg-alert">⚡ Seguimiento</div>`:''}
        </div>`).join('')}
      </div>`;
    }).join('')+'</div>';
  } else {
    if (!leads.length) { el.innerHTML='<div class="loading">Sin leads aún.</div>'; return; }
    el.innerHTML=`<div class="list-wrap"><table>
      <thead><tr><th>Nombre</th><th>Isapre</th><th>UF actual</th><th>Cargas</th><th>Fuente</th><th>Etapa</th><th>Seguimiento</th></tr></thead>
      <tbody>${leads.map(l=>`<tr onclick="openDetail('${l.id}')">
        <td style="font-weight:500">${l.nombre}</td>
        <td>${l.isapre_actual||'—'}</td>
        <td style="font-family:'DM Mono',monospace">${l.precio_actual_uf?l.precio_actual_uf+' UF':'—'}</td>
        <td>${l.cargas||0}</td>
        <td>${l.fuente?`<span class="lead-card-badge ${fuenteClass(l.fuente)}">${l.fuente}</span>`:'—'}</td>
        <td><span class="etapa-pill ${etapaClass(l.etapa)}">${l.etapa}</span></td>
        <td>${l.fecha_proximo_seguimiento||'—'}</td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  }
}

function openForm(id) {
  editingId=id||null;
  document.getElementById('form-title').textContent=id?'Editar lead':'Nuevo lead';
  document.getElementById('btn-del').style.display=id?'block':'none';
  const l=id?leads.find(x=>x.id===id):{};
  const g=x=>document.getElementById(x);
  g('f-nombre').value=l.nombre||'';
  g('f-tel').value=l.telefono||'';
  g('f-email').value=l.email||'';
  g('f-fuente').value=l.fuente||'';
  g('f-isapre').value=l.isapre_actual||'';
  g('f-plan-actual').value=l.plan_actual||'';
  g('f-precio-uf').value=l.precio_actual_uf||'';
  g('f-cargas').value=l.cargas||0;
  g('f-etapa').value=l.etapa||'Nuevo lead';
  g('f-seg').value=l.fecha_proximo_seguimiento||'';
  g('f-plan-tomado').value=l.plan_tomado||'';
  g('f-valor-plan').value=l.valor_plan_uf||'';
  g('f-notas').value=l.notas||'';
  document.getElementById('form-modal').style.display='flex';
}
function closeForm() { document.getElementById('form-modal').style.display='none'; editingId=null; }

function collectForm() {
  const g=x=>document.getElementById(x);
  return {
    nombre:g('f-nombre').value.trim(),
    telefono:g('f-tel').value.trim()||null,
    email:g('f-email').value.trim()||null,
    fuente:g('f-fuente').value||null,
    isapre_actual:g('f-isapre').value||null,
    plan_actual:g('f-plan-actual').value.trim()||null,
    precio_actual_uf:parseFloat(g('f-precio-uf').value)||null,
    cargas:parseInt(g('f-cargas').value)||0,
    etapa:g('f-etapa').value||'Nuevo lead',
    fecha_proximo_seguimiento:g('f-seg').value||null,
    plan_tomado:g('f-plan-tomado').value.trim()||null,
    valor_plan_uf:parseFloat(g('f-valor-plan').value)||null,
    notas:g('f-notas').value.trim()||null,
  };
}

async function handleSave() {
  const data=collectForm();
  if (!data.nombre) { alert('El nombre es obligatorio'); return; }
  try {
    if (editingId) await req('PATCH','leads?id=eq.'+editingId,data);
    else await req('POST','leads',data);
    closeForm(); await load();
  } catch(e) { showErr('Error al guardar: '+e.message); }
}

async function handleDelete() {
  if (!confirm('¿Eliminar este lead?')) return;
  try { await req('DELETE','leads?id=eq.'+editingId); closeForm(); await load(); }
  catch(e) { showErr('Error al eliminar'); }
}

function openDetail(id) {
  detailId=id;
  const l=leads.find(x=>x.id===id);
  document.getElementById('detail-name').textContent=l.nombre;
  document.getElementById('detail-body').innerHTML=[
    ['Etapa',`<span class="etapa-pill ${etapaClass(l.etapa)}">${l.etapa}</span>`],
    ['Teléfono',l.telefono||'—'],['Email',l.email||'—'],['Fuente',l.fuente||'—'],
    ['Isapre actual',l.isapre_actual||'—'],['Plan actual',l.plan_actual||'—'],
    ['Precio actual',l.precio_actual_uf?l.precio_actual_uf+' UF':'—'],
    ['Cargas',l.cargas||0],['Plan tomado',l.plan_tomado||'—'],
    ['Valor plan',l.valor_plan_uf?l.valor_plan_uf+' UF':'—'],
    ['Próximo seguimiento',l.fecha_proximo_seguimiento||'—'],
    ['Notas',l.notas||'—'],
  ].map(([k,v])=>`<div class="detail-row"><span class="dl">${k}</span><span class="dv">${v}</span></div>`).join('');
  document.getElementById('detail-modal').style.display='flex';
}
function closeDetail() { document.getElementById('detail-modal').style.display='none'; detailId=null; }
function editFromDetail() { closeDetail(); openForm(detailId); }
async function handleDeleteFromDetail() {
  if (!confirm('¿Eliminar este lead?')) return;
  try { await req('DELETE','leads?id=eq.'+detailId); closeDetail(); await load(); }
  catch(e) { showErr('Error al eliminar'); }
}

load();
</script>
</body>
</html>
